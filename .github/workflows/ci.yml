name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        run: ruff check src tests
      - name: Type check
        run: mypy src
      - name: Test
        run: pytest --cov=llm_validation_platform --cov-report=term-missing
      - name: Smoke run (report generation)
        run: python -m llm_validation_platform.cli --json --out reports
      - name: Upload validation report
        uses: actions/upload-artifact@v4
        with:
          name: validation-report-${{ matrix.python-version }}
          path: reports/
